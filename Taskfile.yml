version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "PureRaw"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  dev:fast:
    summary: Runs the application in fast dev mode (skips bindings and frontend build)
    desc: |
      Fast development mode - skips binding generation and frontend build.
      Uses config-fast.yml which removes the build step from dev_mode.executes.
      Faster startup for quick iterations on Go code changes.
    cmds:
      - wails3 dev -config ./build/config-fast.yml -port {{.VITE_PORT}}
    env:
      WAILS_VITE_PORT: "{{.VITE_PORT}}"

  dev:air:
    summary: Runs the application with Air hot reload (Go backend only)
    desc: |
      Development mode with Air hot reload for Go code.
      Requires Air to be installed: go install github.com/cosmtrek/air@latest
      Run frontend separately: task dev:frontend
    cmds:
      - air -c .air.toml
    env:
      WAILS_VITE_PORT: "{{.VITE_PORT}}"

  dev:frontend:
    summary: Runs only the frontend dev server
    dir: frontend
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
