root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main.exe"
  cmd = "go build -gcflags=\"all=-N -l\" -tags dev -o ./tmp/main.exe ."
  delay = 1000
  # 设置环境变量，让 Wails 知道 Vite 服务器端口
  envs = ["WAILS_VITE_PORT=9245"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "frontend", "frontend/dist", "build", "bin", ".git", ".vscode", ".kiro", ".task","node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
